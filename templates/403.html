<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ запрещён</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    font-family: Arial, sans-serif;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 20px;
}
.card {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
    margin-bottom: 20px;
}
h1 { font-size: 3rem; color: #dc3545; }
p { font-size: 1.2rem; color: #333; margin-bottom: 20px; }
a.btn { font-weight: 600; }
#gameCanvas {
    border: 2px solid #333;
    border-radius: 10px;
    background: #87ceeb; /* небесно-голубой фон для игры */
    touch-action: none;
    width: 100%;
    max-width: 400px;
    height: 500px;
}
.score {
    font-size: 1.2rem;
    color: #555;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="card">
    <h1>🚫 Доступ запрещён</h1>
    <p>У вас нет прав для просмотра этой страницы.</p>
    <a href="{{ url_for('logout') }}" class="btn btn-primary">🏠 На главную</a>
    <p style="margin-top: 15px; color:#555;">Обратитесь к администратору.</p>
</div>

<canvas id="gameCanvas"></canvas>
<div class="score" id="scoreDisplay">Очки: 0</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Адаптивность
canvas.width = Math.min(window.innerWidth - 40, 400);
canvas.height = canvas.width * 1.25;

let paddleWidth = canvas.width * 0.25;
let paddleHeight = 12;
let paddleX = (canvas.width - paddleWidth)/2;

let ballRadius = 10;
let x = canvas.width/2;
let y = canvas.height-50;
let dx = 3;
let dy = -3;

let score = 0;
let rightPressed = false;
let leftPressed = false;

// Плитки
let brickRowCount = 4;
let brickColumnCount = 6;
let brickWidth = canvas.width / brickColumnCount - 10;
let brickHeight = 20;
let brickPadding = 5;
let brickOffsetTop = 40;
let brickOffsetLeft = 5;

let bricks = [];
for(let c=0; c<brickColumnCount; c++){
    bricks[c] = [];
    for(let r=0; r<brickRowCount; r++){
        bricks[c][r] = { x:0, y:0, status:1 };
    }
}

document.addEventListener("keydown", (e)=> {
    if(e.key === "ArrowRight") rightPressed = true;
    if(e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", (e)=> {
    if(e.key === "ArrowRight") rightPressed = false;
    if(e.key === "ArrowLeft") leftPressed = false;
});

// Мобильное управление
canvas.addEventListener("touchmove", function(e){
    let touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    paddleX = touchX - paddleWidth/2;
    if(paddleX < 0) paddleX = 0;
    if(paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
    e.preventDefault();
}, {passive:false});

function drawPaddle(){
    ctx.fillStyle = "#00FF00";
    ctx.fillRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
}

function drawBall(){
    ctx.beginPath();
    ctx.arc(x,y,ballRadius,0,Math.PI*2);
    ctx.fillStyle="#FF4500";
    ctx.fill();
    ctx.closePath();
}

function drawBricks(){
    for(let c=0; c<brickColumnCount; c++){
        for(let r=0; r<brickRowCount; r++){
            if(bricks[c][r].status == 1){
                let brickX = (c*(brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r*(brickHeight + brickPadding)) + brickOffsetTop;
                bricks[c][r].x = brickX;
                bricks[c][r].y = brickY;
                ctx.fillStyle = "#FFD700"; // золотые плитки
                ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
            }
        }
    }
}

function drawScore(){
    document.getElementById("scoreDisplay").textContent = "Очки: " + score;
}

function collisionDetection(){
    for(let c=0; c<brickColumnCount; c++){for(let r=0; r<brickRowCount; r++){
            let b = bricks[c][r];
            if(b.status == 1){
                if(x > b.x && x < b.x + brickWidth && y - ballRadius < b.y + brickHeight && y + ballRadius > b.y){
                    dy = -dy;
                    b.status = 0;
                    score += 5;
                }
            }
        }
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBricks();
    drawBall();
    drawPaddle();
    drawScore();
    collisionDetection();

    // Столкновения со стенами
    if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
    if(y + dy < ballRadius) dy = -dy;
    else if(y + dy > canvas.height - ballRadius - paddleHeight - 10){
        if(x > paddleX && x < paddleX + paddleWidth){
            dy = -dy;
        } else { // потеря
            x = canvas.width/2;
            y = canvas.height-50;
            dx = 3;
            dy = -3;
            score = 0;
            // восстановление плиток
            for(let c=0;c<brickColumnCount;c++){
                for(let r=0;r<brickRowCount;r++){
                    bricks[c][r].status=1;
                }
            }
        }
    }

    x += dx;
    y += dy;

    if(rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 6;
    if(leftPressed && paddleX > 0) paddleX -= 6;

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
